services:
  postgres:
    image: postgres:16-alpine
    container_name: todolist-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: todo_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - todolist-network

  backend:
    image: ghcr.io/qingyunne/todolist-backend:latest
    container_name: todolist-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/todo_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SERVER_PORT: 1122
    ports:
      - "1122:1122"
    networks:
      - todolist-network

  frontend:
    image: ghcr.io/qingyunne/todolist-frontend:latest
    container_name: todolist-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"
    networks:
      - todolist-network

volumes:
  postgres_data:
    driver: local

networks:
  todolist-network:
    driver: bridge